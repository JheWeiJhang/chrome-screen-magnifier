<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      user-select: none;
    }

    .header {
      background: linear-gradient(135deg, #1e1e3f, #2d1b69);
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-icon { font-size: 22px; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .toggle-btn {
      width: calc(100% - 40px);
      margin: 16px 20px 8px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .toggle-btn.off {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .toggle-btn.on {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }

    .toggle-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    .shortcut-hint {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 16px;
    }

    kbd {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 11px;
    }

    .section {
      padding: 14px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .slider-label {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      width: 56px;
      flex-shrink: 0;
    }

    .slider-wrap {
      flex: 1;
      position: relative;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #7c3aed;
      box-shadow: 0 0 6px rgba(124,58,237,0.6);
      cursor: pointer;
    }

    .slider-value {
      font-size: 12px;
      font-weight: 700;
      color: #a78bfa;
      width: 42px;
      text-align: right;
      flex-shrink: 0;
    }

    .presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .preset-btn {
      padding: 5px 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-btn:hover {
      background: rgba(124,58,237,0.3);
      border-color: rgba(124,58,237,0.5);
      color: #fff;
    }

    .preset-btn.active {
      background: rgba(124,58,237,0.25);
      border-color: #7c3aed;
      color: #c4b5fd;
    }

    .tip {
      padding: 10px 20px 14px;
      font-size: 10.5px;
      color: rgba(255,255,255,0.25);
      line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .tip span { color: rgba(255,255,255,0.45); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🔍</div>
    <div class="header-text">
      <h1>區域放大鏡</h1>
      <p>Screen Magnifier</p>
    </div>
  </div>

  <button id="toggleBtn" class="toggle-btn off">
    <span id="toggleIcon">⭕</span>
    <span id="toggleText">放大鏡已關閉</span>
  </button>
  <div class="shortcut-hint">
    快捷鍵：<kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>Y</kbd>
    &nbsp;·&nbsp;
    <a id="customizeLink" href="#" style="color:#a78bfa;text-decoration:none;font-size:11px;">自訂</a>
  </div>

  <div class="section">
    <div class="section-title">放大倍率</div>
    <div class="slider-row">
      <span class="slider-label">倍率</span>
      <div class="slider-wrap">
        <input type="range" id="zoomSlider" min="1.5" max="10" step="0.5" value="3">
      </div>
      <span class="slider-value" id="zoomVal">3x</span>
    </div>
    <div class="presets" id="zoomPresets">
      <button class="preset-btn" data-zoom="2">2x</button>
      <button class="preset-btn" data-zoom="3">3x</button>
      <button class="preset-btn" data-zoom="5">5x</button>
      <button class="preset-btn" data-zoom="8">8x</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">放大範圍（半徑）</div>
    <div class="slider-row">
      <span class="slider-label">範圍</span>
      <div class="slider-wrap">
        <input type="range" id="radiusSlider" min="40" max="300" step="10" value="120">
      </div>
      <span class="slider-value" id="radiusVal">120px</span>
    </div>
    <div class="presets" id="radiusPresets">
      <button class="preset-btn" data-radius="60">小</button>
      <button class="preset-btn" data-radius="120">中</button>
      <button class="preset-btn" data-radius="180">大</button>
      <button class="preset-btn" data-radius="250">超大</button>
    </div>
  </div>

  <div class="tip">
    啟用後：<span>Shift+滾輪</span> 調整範圍，<span>滾輪</span> 調整倍率
  </div>

  <script src="popup.js"></script>
</body>
</html>
